  # ----------------------------------------------------------
  # IDC - EC2
  # ----------------------------------------------------------
  EC2IdcDns: # EC2-IDC-DNS_Server
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      ImageId: !Ref AmiRockyLinux
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref SnIdc
          GroupSet:
            - !Ref SgIdc
          PrivateIpAddress: 10.2.1.200
      Tags:
        - Key: Name
          Value: EC2-IDC-DNS
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          hostnamectl --static set-hostname Seoul-IDC-DNS
          cat <<EOF > /etc/profile.d/prompt.sh
          export PS1="\[\e[1;31m\]\u\[\e[m\]@\[\e[1;32m\]\h\[\e[m\]: \[\e[1;34m\]\w\[\e[m\]\$ "
          EOF
          source /etc/profile
          (
          echo "qwe123"
          echo "qwe123"
          ) | passwd --stdin root
          sed -i "s/^PasswordAuthentication no/PasswordAuthentication yes/g" /etc/ssh/sshd_config
          sed -i "s/^#PermitRootLogin prohibit-password/PermitRootLogin yes/g" /etc/ssh/sshd_config
          service sshd restart
          dnf install bind -y
          sed -i "s/listen-on port 53 { 127.0.0.1; };/listen-on port 53 { any; };/g" /etc/named.conf
          sed -i "s/allow-query     { localhost; };/allow-query     { any; };/g" /etc/named.conf
          cat <<EOF >> /etc/named.rfc1912.zones
          zone "idcseoul.internal" { type master; file "/var/named/db.idcseoul.internal"; };
          zone "idcsingapore.internal" { type forward; forwarders { 10.4.1.200; }; };
          EOF
          cat <<EOF > /var/named/db.idcseoul.internal
          \$TTL 300
          @ IN SOA idcseoul.internal. root.idcseoul.internal. ( 2019122114 3600 900 604800 86400 )
          @      IN NS idcseoul.internal.
          DNSSrv IN A  10.2.1.200
          DBSrv  IN A  10.2.1.100
          EOF
          systemctl enable --now named

